name: Pack Release

on:
  push:
    branches: [master]
    paths:
      - 'Frigus_Nox.xml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump version and pack
        run: python pack.py

      - name: Get version
        id: version
        run: echo "version=$(grep '^version' blender_manifest.toml | sed 's/version = "\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add blender_manifest.toml
          git commit -m "Bump version to ${{ steps.version.outputs.version }}"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Frigus Nox ${{ steps.version.outputs.version }}
          files: frigus_nox-${{ steps.version.outputs.version }}.zip
